# Data Prepper Pipeline Configuration
# Processes and transforms logs and traces before writing to OpenSearch
# (No Prometheus sink - Agent Health computes metrics from trace spans directly)

# Main OTLP pipeline - receives all telemetry and routes by type
otlp-pipeline:
  delay: 10
  source:
    otlp:
      port: 21890
      ssl: false
  route:
    - logs: "getEventType() == \"LOG\""
    - traces: "getEventType() == \"TRACE\""
  sink:
    - pipeline:
        name: "otel-logs-pipeline"
        routes:
          - "logs"
    - pipeline:
        name: "otel-traces-pipeline"
        routes:
          - "traces"

# Log processing pipeline
otel-logs-pipeline:
  workers: 5
  delay: 10
  source:
    pipeline:
      name: "otlp-pipeline"
  buffer:
    bounded_blocking:
  processor:
    - copy_values:
        entries:
          - from_key: "time"
            to_key: "@timestamp"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: OPENSEARCH_USER
        password: OPENSEARCH_PASSWORD
        insecure: true
        index_type: log-analytics-plain

# Trace processing pipeline
otel-traces-pipeline:
  delay: 100
  source:
    pipeline:
      name: "otlp-pipeline"
  sink:
    - pipeline:
        name: "traces-raw-pipeline"
    - pipeline:
        name: "service-map-pipeline"

# Raw trace storage pipeline
traces-raw-pipeline:
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: OPENSEARCH_USER
        password: OPENSEARCH_PASSWORD
        insecure: true
        index_type: trace-analytics-plain-raw

# Service map generation pipeline
# Builds service dependency maps from trace relationships
# Only writes SERVICE_MAP events to OpenSearch; discards METRIC events
service-map-pipeline:
  delay: 100
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_apm_service_map:
        group_by_attributes: [telemetry.sdk.language]
        window_duration: 10s
  route:
    - otel_apm_service_map_route: 'getEventType() == "SERVICE_MAP"'
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: OPENSEARCH_USER
        password: OPENSEARCH_PASSWORD
        index_type: otel-v2-apm-service-map
        routes: [otel_apm_service_map_route]
        insecure: true
